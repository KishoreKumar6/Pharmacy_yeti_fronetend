name: Deploy Frontend Application

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/pharmacy-frontend:latest .

      - name: Publish Image to Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/pharmacy-frontend:latest

  deploy:
    needs: build
    runs-on: self-hosted
    steps:
      - name: Pull Image from Docker Hub
        run: docker pull ${{ secrets.DOCKER_USERNAME }}/pharmacy-frontend:latest

      - name: Run Docker Container
        run: |
          docker rm -f pharmacy-frontend || true
          docker run -d -p 5173:80 --name pharmacy-frontend \
            ${{ secrets.DOCKER_USERNAME }}/pharmacy-frontend:latest
